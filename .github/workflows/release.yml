# Builds the app on tag push. The zip must be signed locally with
# Sparkle EdDSA keys before uploading to GitHub Releases.
# This workflow builds and uploads an UNSIGNED zip as a draft release.
# After downloading, sign it with `sign_update` and publish the release.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve Swift packages
        run: xcodebuild -project DayPlanner.xcodeproj -scheme DayPlanner -resolvePackageDependencies

      - name: Build Release
        run: >
          xcodebuild
          -project DayPlanner.xcodeproj
          -scheme DayPlanner
          -configuration Release
          -derivedDataPath build/
          CODE_SIGN_IDENTITY="-"
          build

      - name: Package app
        run: ditto -c -k --keepParent "build/Build/Products/Release/DayPlanner.app" DayPlanner.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DayPlanner
          path: DayPlanner.zip
